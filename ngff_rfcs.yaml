  rfc4:
    id: rfc/4
    url: https://ngff.openmicroscopy.org/rfc/4
    title: Axis Orientation
    description: This RFC proposes the addition of an optional orientation field to
      the OME-NGFF axis description. This field will provide explicit metadata about
      the orientation in an image using a controlled vocabulary. For anatomical data,
      this includes anatomical orientation information. The goal is to preserve essential
      biological information and eliminate assumptions about orientation which can
      lead to errors in downstream analysis and alignment to anatomical atlases.
    status: Under review
    state_code: R1
    status_text: This RFC is currently in RFC state R1 (send for review).
