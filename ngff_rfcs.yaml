  rfc3:
    id: rfc/3
    url: https://ngff.openmicroscopy.org/rfc/3
    title: more dimensions for thee
    description: OME-Zarr version 0.4 restricts the number, names, ordering, and type
      of axes that are allowed in the axes metadata. These restrictions have limited
      conversion of proprietary datasets, usage by microscope vendors[^1], and usage
      by novel microscopy modalities[^2].
    status: Under review
    state_code: R1
