<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚧 OME-NGFF RFC STATS 🚧</title>

<!-- jQuery + DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<!-- js-yaml to parse the YAML the scraper produces -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<!-- Read the Docs fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* Read the Docs Sphinx theme palette */
    --rtd-blue:    #2980b9;
    --rtd-blue-d:  #2472a4;
    --rtd-dark:    #343131;
    --rtd-darker:  #2c2c2c;
    --rtd-ink:     #404040;
    --rtd-muted:   #707070;
    --rtd-rule:    #e1e4e5;
    --rtd-row-alt: #f3f6f6;
    --rtd-bg:      #fcfcfc;
    --rtd-code:    #e74c3c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Lato", -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--rtd-ink);
    background: var(--rtd-bg);
  }

  /* Updated timestamp, quiet caption above the content */
  .updated { color: var(--rtd-muted); font-size: .82rem; margin: 0 0 22px; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 28px; }

  main { padding: 40px 0 80px; }

  section { margin-bottom: 52px; }

  h2 {
    font-family: "Roboto Slab", serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--rtd-dark);
    margin: 0 0 4px;
  }
  h2 .anchor { color: var(--rtd-blue); font-weight: 400; }
  .lead {
    color: var(--rtd-muted);
    font-size: .92rem;
    margin: 0 0 18px;
    border-left: 3px solid var(--rtd-blue);
    padding-left: 12px;
  }

  /* DataTables, reskinned to feel like an RTD content table */
  table.dataTable {
    width: 100% !important;
    border-collapse: collapse !important;
    border: 1px solid var(--rtd-rule);
    background: #fff;
    margin: 0 !important;
  }
  table.dataTable thead th {
    background: #fff;
    font-family: "Roboto Slab", serif;
    font-weight: 700;
    color: var(--rtd-dark);
    text-align: left;
    border-bottom: 2px solid var(--rtd-blue) !important;
    border-top: none;
    padding: 11px 14px;
    white-space: nowrap;
  }
  /* Headers with an explanatory tooltip get a dotted underline + help cursor */
  table.dataTable thead th[title] {
    text-decoration: underline dotted var(--rtd-muted);
    text-underline-offset: 3px;
    cursor: help;
  }
  table.dataTable tbody td {
    padding: 9px 14px;
    border-top: 1px solid var(--rtd-rule);
    vertical-align: top;
  }
  table.dataTable tbody tr:nth-child(even) { background: var(--rtd-row-alt); }
  table.dataTable tbody tr:hover { background: #ecf3f8; }

  /* Numeric columns: tabular, centered */
  td.num, th.num { text-align: center; font-variant-numeric: tabular-nums; }

  a { color: var(--rtd-blue); text-decoration: none; }
  a:hover { color: var(--rtd-blue-d); text-decoration: underline; }

  .rfc-badge {
    display: inline-block;
    min-width: 26px;
    text-align: center;
    font-weight: 700;
    font-family: "Roboto Slab", serif;
  }

  /* Title cell: dotted underline hints there's a description on hover */
  .title-cell { cursor: help; text-decoration: underline dotted var(--rtd-rule); text-underline-offset: 3px; }

  /* Status pills mirror RTD admonition colors */
  .status { font-size: .82rem; font-weight: 700; padding: 2px 8px; border-radius: 3px; white-space: nowrap; }
  .status.adopted    { background: #dbfae4; color: #1f7a3d; }
  .status.review     { background: #e7f2fa; color: var(--rtd-blue-d); }
  .status.draft      { background: #fff3d4; color: #8a6d00; }
  .status.withdrawn  { background: #fde7e7; color: #b33; }
  .status.unknown    { background: #efefef; color: #777; }
  .status[title]     { cursor: help; }

  .compact-people { white-space: nowrap; }
  .compact-people .more,
  .more { color: var(--rtd-blue); font-weight: 700; font-size: .82em; cursor: help; }
  span[title] { text-underline-offset: 2px; }

  .muted { color: var(--rtd-muted); }
  .nowrap { white-space: nowrap; }

  /* Clickable record-count cells open a modal */
  .recs.clickable { cursor: pointer; }
  .recs.clickable:hover .rec-count { text-decoration: underline; color: var(--rtd-blue-d); }
  .rec-count { color: var(--rtd-blue); font-weight: 700; }

  /* DataTables controls */
  .dataTables_wrapper .dataTables_filter input,
  .dataTables_wrapper .dataTables_length select {
    border: 1px solid var(--rtd-rule);
    border-radius: 3px;
    padding: 4px 8px;
  }
  .dataTables_wrapper .dataTables_filter,
  .dataTables_wrapper .dataTables_length { font-size: .85rem; margin-bottom: 10px; }
  .dataTables_wrapper .dataTables_info,
  .dataTables_wrapper .dataTables_paginate { font-size: .82rem; margin-top: 10px; color: var(--rtd-muted); }
  .dataTables_wrapper .dataTables_paginate .paginate_button.current {
    background: var(--rtd-blue) !important;
    color: #fff !important;
    border-radius: 3px;
    border: none !important;
  }

  /* Detail table values list */
  .people { margin: 0; padding: 0; list-style: none; }
  .people li { display: inline; }
  .people li:not(:last-child)::after { content: ", "; }

  /* Compact review/comment id list: "4 (1, 1b, 2, 2b)" */
  .ids { color: var(--rtd-muted); white-space: nowrap; }
  td.recs { white-space: nowrap; }

  footer { color: var(--rtd-muted); font-size: .8rem; padding: 24px 0 60px; }
  code { color: var(--rtd-code); background: #f7f7f7; padding: 1px 4px; border-radius: 2px; font-size: .85em; }

  .error {
    background: #fde7e7; border: 1px solid #f5c6c6; color: #a33;
    padding: 16px 18px; border-radius: 4px; font-size: .9rem;
  }
  .error code { color: #a33; background: #f8d7d7; }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(52,49,49,.45);
    display: none; align-items: flex-start; justify-content: center;
    padding: 60px 20px; z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border: 1px solid var(--rtd-rule); border-radius: 5px;
    max-width: 560px; width: 100%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 2px solid var(--rtd-blue);
  }
  .modal-head h3 {
    margin: 0; font-family: "Roboto Slab", serif; font-size: 1.1rem; color: var(--rtd-dark);
  }
  .modal-close {
    border: none; background: none; font-size: 1.4rem; line-height: 1;
    color: var(--rtd-muted); cursor: pointer; padding: 0 4px;
  }
  .modal-close:hover { color: var(--rtd-dark); }
  .modal-body { padding: 8px 18px 18px; }
  .modal-body .empty { color: var(--rtd-muted); font-size: .9rem; padding: 8px 0; }
  .rec-list { margin: 0; padding: 0; list-style: none; }
  .rec-list li { padding: 12px 0; border-top: 1px solid var(--rtd-rule); }
  .rec-list li:first-child { border-top: none; }
  .rec-id { font-weight: 700; font-family: "Roboto Slab", serif; color: var(--rtd-dark); }
  .rec-meta { color: var(--rtd-muted); font-size: .85rem; margin-top: 2px; }
  .rec-authors { margin-top: 2px; font-size: .9rem; }
</style>
</head>

<body>
  <main class="wrap">
    <p class="updated" id="updated"></p>
    <div id="boot"></div>



    <section id="detail-section" hidden>

             <h2>OME-NGFF RFC Stats</h2>


        <p>📏🏗👷‍♀️🧱🦺 in development 📏🏗👷‍♀️🧱🦺</p>

      <p class="lead">Every field captured in <code>ngff_rfcs.yaml</code>, one row per RFC.</p>
      <div style="overflow-x:auto;">
        <table id="detail" class="display" style="width:100%">
          <thead>
            <tr>
              <th class="num" title="Request for Comments number">RFC</th>
              <th title="RFC title — hover a cell for the full description">Title</th>
              <th title="Current state of the RFC (hover a pill for the full status)">Status</th>
              <th class="num" title="Date the pull request was merged (mm/yy; links to the PR)">PR</th>
              <th class="num" title="Date of the last commit to the RFC text (mm/yy)">Last</th>
              <th class="num" title="Number of endorsers (+1s); hover for names">+1s</th>
              <th class="num" title="Number of reviews — click for details">Rev.</th>
              <th class="num" title="Number of comments — click for details">Comm.</th>
              <th class="num" title="Number of author responses — click for details">Resp.</th>
              <th class="num" title="Number of OME-Zarr versions affected — click for details">Ver.</th>
              <th title="Authors, shown as initials; hover for full names">Auth.</th>

            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer id="footer"></footer>
  </main>

  <!-- Modal for review/comment/response/version details -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

<script>
const YAML_FILE = "ngff_rfcs.yaml";

const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const dash = "<span class='muted'>—</span>";

// Holds the parsed RFC list so the modal can look up entries by index.
let RFCS = [];

function statusPill(status, code, text) {
  if (!status && !code) return dash;
  const key = (status || "").toLowerCase();
  let cls = "unknown";
  if (key.includes("adopt")) cls = "adopted";
  else if (key.includes("review")) cls = "review";
  else if (key.includes("draft")) cls = "draft";
  else if (key.includes("withdraw") || key.includes("supersed")) cls = "withdrawn";
  const label = code || status;
  // Tooltip: the full prose if available, else the human status label.
  const tip = esc(text || status || code);
  return `<span class="status ${cls}" title="${tip}">${esc(label)}</span>`;
}

function people(list) {
  if (!Array.isArray(list) || !list.length) return dash;
  const items = list.map(p => `<li>${esc(p && p.name ? p.name : p)}</li>`).join("");
  return `<ul class="people">${items}</ul>`;
}

// Compact people cell: first name, then "+N" if there are more. The full list
// is available on hover via the title attribute. Keeps wide author/endorser
// lists from blowing out the table width.
function peopleCompact(list) {
  if (!Array.isArray(list) || !list.length) return dash;
  const names = list.map(p => (p && p.name ? p.name : p)).filter(Boolean);
  if (!names.length) return dash;
  const first = esc(names[0]);
  const extra = names.length - 1;
  const full = esc(names.join(", "));
  if (extra <= 0) return `<span title="${full}">${first}</span>`;
  return `<span class="compact-people" title="${full}">${first} <span class="more">+${extra}</span></span>`;
}

// Count of people, with the full list available on hover.
function peopleCount(list) {
  if (!Array.isArray(list) || !list.length) return "0";
  const names = list.map(p => (p && p.name ? p.name : p)).filter(Boolean);
  if (!names.length) return "0";
  return `<span title="${esc(names.join(", "))}">${names.length}</span>`;
}

// Authors as terse initials of the first author, then "+N" if there are more,
// e.g. "JB +5". Full names on hover.
function peopleInitials(list) {
  if (!Array.isArray(list) || !list.length) return dash;
  const names = list.map(p => (p && p.name ? p.name : p)).filter(Boolean);
  if (!names.length) return dash;
  const initials = n =>
    String(n).trim().split(/\s+/).map(w => w[0] || "").join("").toUpperCase();
  const first = esc(initials(names[0]));
  const extra = names.length - 1;
  const full = esc(names.join(", "));
  if (extra <= 0) return `<span title="${full}">${first}</span>`;
  return `<span class="compact-people" title="${full}">${first} <span class="more">+${extra}</span></span>`;
}

// Format an ISO date (YYYY-MM-DD) as mm/yy, with the full date on hover.
// Optionally wrap the result in a link. A data-sort attribute carries the raw
// ISO date so DataTables sorts chronologically rather than alphabetically.
function dateShort(iso, href) {
  if (!iso) return { display: dash, sort: "" };
  const s = String(iso);
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(s);
  const short = m ? `${m[2]}/${m[1].slice(2)}` : esc(s);
  const inner = `<span title="${esc(s)}">${short}</span>`;
  const display = href
    ? `<a href="${esc(href)}" target="_blank" rel="noopener">${inner}</a>`
    : inner;
  return { display, sort: s };
}

// Clickable count cell. Stores the RFC index and field so the modal can fetch
// the entries on click. Sorts on the count.
function recCell(list, rfcIdx, field) {
  const n = Array.isArray(list) ? list.length : 0;
  if (!n) return { display: "0", "@data-count": 0 };
  const display =
    `<span class="recs clickable" data-rfc="${rfcIdx}" data-field="${field}" ` +
    `role="button" tabindex="0" title="Click for details">` +
    `<span class="rec-count">${n}</span></span>`;
  return { display, "@data-count": n };
}

function num(rfc) {
  // "rfc/8" -> 8 ; fall back to the key
  const m = /(\d+)/.exec(rfc.id || "");
  return m ? parseInt(m[1], 10) : null;
}

function rfcLink(rfc) {
  const n = num(rfc);
  const label = `<span class="rfc-badge">${n ?? "?"}</span>`;
  return rfc.url ? `<a href="${esc(rfc.url)}" target="_blank" rel="noopener">${label}</a>` : label;
}

// Title cell with the description exposed on hover.
function titleCell(rfc) {
  const title = rfc.title || dash;
  const desc = rfc.description;
  if (!desc) return esc(rfc.title || "") || dash;
  return `<span class="title-cell" title="${esc(desc)}">${esc(title)}</span>`;
}

function descOf(rfc) {
  return rfc.title || rfc.description || "";
}

// fall back to the scraper's computed `year`.
function mergeYear(rfc) {
  if (rfc.pr_merge_date) return String(rfc.pr_merge_date).slice(0, 4);
  if (rfc.year != null) return String(rfc.year);
  return null;
}

// ---- Modal handling ----
const FIELD_LABELS = { reviews: "Reviews", comments: "Comments", responses: "Responses", versions: "Versions" };

function openModal(rfcIdx, field) {
  const rfc = RFCS[rfcIdx];
  if (!rfc) return;
  const list = Array.isArray(rfc[field]) ? rfc[field] : [];
  const n = num(rfc);
  document.getElementById("modal-title").textContent =
    `RFC-${n ?? "?"} · ${FIELD_LABELS[field] || field}`;

  const body = document.getElementById("modal-body");
  if (!list.length) {
    body.innerHTML = `<p class="empty">No ${FIELD_LABELS[field].toLowerCase()} recorded.</p>`;
  } else {
    const items = list.map(e => {
      const shortId = String(e.id || "").split("/").pop() || "?";
      const idHtml = e.url
        ? `<a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(shortId)}</a>`
        : esc(shortId);
      const authors = Array.isArray(e.authors)
        ? e.authors.map(a => esc(a && a.name ? a.name : a)).filter(Boolean).join(", ")
        : "";
      const bits = [];
      if (e.date) bits.push(esc(e.date));
      if (e.related_to) bits.push("re: " + esc(String(e.related_to).split("/").pop()));
      const meta = bits.length ? `<div class="rec-meta">${bits.join(" · ")}</div>` : "";
      const auth = authors ? `<div class="rec-authors">${authors}</div>` : "";
      return `<li><span class="rec-id">${idHtml}</span>${meta}${auth}</li>`;
    }).join("");
    body.innerHTML = `<ul class="rec-list">${items}</ul>`;
  }
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

function render(doc) {
  const map = doc.ngff_rfcs || {};
  // sort by RFC number
  const rfcs = Object.values(map).sort((a, b) => (num(a) ?? 1e9) - (num(b) ?? 1e9));
  RFCS = rfcs;

  if (doc.last_updated) {
    document.getElementById("updated").textContent =
      "Updated " + doc.last_updated.replace("T", " ").replace("Z", " UTC");
  }

  const len = x => Array.isArray(x) ? x.length : 0;



  // ---- Detail table ----
  const detailRows = rfcs.map((r, i) => {
    const pr   = dateShort(r.pr_merge_date, r.pr_url);
    const last = dateShort(r.last_text_commit_date);
    return [
      rfcLink(r),
      titleCell(r),
      statusPill(r.status, r.state_code, r.status_text),
      { display: pr.display,   "@data-sort": pr.sort },
      { display: last.display, "@data-sort": last.sort },
      peopleCount(r.endorsers),
      recCell(r.reviews,   i, "reviews"),
      recCell(r.comments,  i, "comments"),
      recCell(r.responses, i, "responses"),
      recCell(r.versions,  i, "versions"),
      peopleInitials(r.authors),
    ];
  });

  $("#detail").DataTable({
    data: detailRows,
    paging: false,
    info: true,
    order: [[0, "asc"]],
    columnDefs: [
      { targets: [0, 3, 4, 5], className: "num" },
      // Date columns: render display HTML, sort on the raw ISO date string.
      { targets: [3, 4],
        render: (d, t) => (t === "sort" || t === "type") ? (d["@data-sort"] || "") : d.display },
      { targets: 5, type: "num", render: (d, t) =>
          t === "sort" ? (parseInt(String(d).replace(/<[^>]*>/g, ""), 10) || 0) : d },
      // Clickable count columns: sort on the numeric count.
      { targets: [6, 7, 8, 9], className: "recs num",
        type: "num",
        render: (d, t) => (t === "sort" || t === "type") ? (d["@data-count"] || 0) : d.display },
      { targets: 0, type: "num", render: (d, t) =>
          t === "sort" ? (/(\d+)/.exec(d) || [0,1e9])[1] * 1 : d },
    ],
    language: { search: "Filter:" },
  });

  // Delegate clicks on count cells to open the modal.
  $("#detail tbody").on("click", "span.recs.clickable", function () {
    openModal(parseInt(this.dataset.rfc, 10), this.dataset.field);
  });
  $("#detail tbody").on("keydown", "span.recs.clickable", function (e) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      openModal(parseInt(this.dataset.rfc, 10), this.dataset.field);
    }
  });

  document.getElementById("detail-section").hidden = false;
  document.getElementById("footer").innerHTML =
    `Source: <a href="${esc(doc.source || "https://github.com/lubianat/rfc_stats")}" target="_blank" rel="noopener">${esc(doc.source || "lubianat/rfc_stats")}</a>. ` +
    `Generated from <code>${YAML_FILE}</code>.`;
}

// Modal close wiring
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target.id === "modal-overlay") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

fetch(YAML_FILE)
  .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.text(); })
  .then(txt => render(jsyaml.load(txt)))
  .catch(err => {
    document.getElementById("boot").innerHTML =
      `<div class="error"><strong>Could not load <code>${YAML_FILE}</code>.</strong><br>` +
      `${esc(err.message)}.<br>Serve this folder over HTTP (browsers block ` +
      `<code>fetch</code> on <code>file://</code>): e.g. <code>python3 -m http.server</code> ` +
      `in the directory containing <code>index.html</code> and <code>${YAML_FILE}</code>.</div>`;
  });
</script>
</body>
</html>
